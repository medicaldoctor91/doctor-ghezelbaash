name: Extract uploaded ZIP on main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/unzip-main.yml

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract archive safely into repository root
        shell: bash
        run: |
          set -euo pipefail
          archive='astro_best_doctor_with_baselayout_domain_v2.zip'
          test -f "$archive"
          rm -rf .extract-temp
          mkdir -p .extract-temp

          python3 - <<'PY'
          from pathlib import Path, PurePosixPath
          from zipfile import ZipFile

          archive = Path('astro_best_doctor_with_baselayout_domain_v2.zip')
          destination = Path('.extract-temp').resolve()

          with ZipFile(archive) as zf:
              for member in zf.infolist():
                  name = member.filename.replace('\\', '/')
                  path = PurePosixPath(name)
                  if path.is_absolute() or '..' in path.parts:
                      raise SystemExit(f'Unsafe ZIP member: {member.filename}')
              zf.extractall(destination)
          PY

          rm -f "$archive"
          rm -f .github/workflows/unzip-main.yml
          cp -a .extract-temp/. .
          rm -rf .extract-temp

      - name: Commit extracted files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Extract uploaded ZIP on main'
          git push origin HEAD:main
