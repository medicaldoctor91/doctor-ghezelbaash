name: Deploy B20 from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Expand B20 ZIP when source is not yet bootstrapped
        run: |
          ZIP=""
          for candidate in ghezelbaash-b20-github-source-no-mp4.zip b20-source-no-mp4.zip; do
            if [ -f "$candidate" ]; then
              ZIP="$candidate"
              break
            fi
          done
          if [ ! -f package.json ] && [ -n "$ZIP" ]; then
            echo "No package.json found; extracting $ZIP for this build."
            rm -rf /tmp/b20-source
            mkdir -p /tmp/b20-source
            unzip -q "$ZIP" -d /tmp/b20-source
            ROOT="/tmp/b20-source"
            if [ ! -f "$ROOT/package.json" ]; then
              CANDIDATE=$(find "$ROOT" -mindepth 1 -maxdepth 1 -type d | head -n 1)
              if [ -n "$CANDIDATE" ] && [ -f "$CANDIDATE/package.json" ]; then
                ROOT="$CANDIDATE"
              fi
            fi
            test -f "$ROOT/package.json" || (echo "Could not find package.json in extracted ZIP." && exit 1)
            rsync -a "$ROOT/" ./
          fi
          test -f package.json || (echo "package.json not found. Upload ghezelbaash-b20-github-source-no-mp4.zip or B20 source first." && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build site
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
