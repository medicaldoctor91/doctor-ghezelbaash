name: Unzip website source

on:
  push:
    branches:
      - unzip-source-v7.3.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unpack archive into repository root
        shell: bash
        run: |
          set -euo pipefail
          archive="ghezelbaash-goal-first-v7.3.0-source.zip"
          test -f "$archive"

          temp_dir="$(mktemp -d)"
          unzip -q "$archive" -d "$temp_dir"

          shopt -s dotglob nullglob
          entries=("$temp_dir"/*)
          source_dir="$temp_dir"
          if [[ ${#entries[@]} -eq 1 && -d "${entries[0]}" ]]; then
            source_dir="${entries[0]}"
          fi

          rsync -a --exclude='.git/' "$source_dir"/ ./
          rm -f "$archive"

      - name: Commit unpacked source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: unpack website source v7.3.0"
          git push origin HEAD:unzip-source-v7.3.0
