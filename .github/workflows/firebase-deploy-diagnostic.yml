name: Firebase Deploy Diagnostic

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/firebase-deploy-diagnostic.yml'
      - '.github/firebase-deploy-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: firebase-deploy-diagnostic
  cancel-in-progress: true

jobs:
  diagnostic:
    name: Diagnose Firebase Hosting deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare diagnostic file
        run: |
          mkdir -p .github/diagnostics
          {
            echo '# Firebase Deploy Diagnostic'
            echo
            echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo
          } > .github/diagnostics/firebase-deploy-status.md

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v3
        continue-on-error: true
        with:
          project_id: ghezelbaash-kg
          workload_identity_provider: projects/71850730043/locations/global/workloadIdentityPools/github-actions/providers/doctor-ghezelbaash
          service_account: github-firebase-hosting@ghezelbaash-kg.iam.gserviceaccount.com
          create_credentials_file: true
          export_environment_variables: true

      - name: Record auth result
        if: always()
        run: |
          {
            echo '## Google Auth'
            echo "auth_outcome=${{ steps.auth.outcome }}"
            echo "auth_conclusion=${{ steps.auth.conclusion }}"
            echo
            echo "GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-missing}"
            echo "GOOGLE_GHA_CREDS_PATH=${GOOGLE_GHA_CREDS_PATH:-missing}"
          } >> .github/diagnostics/firebase-deploy-status.md

      - name: Setup gcloud
        if: always()
        uses: google-github-actions/setup-gcloud@v2
        continue-on-error: true

      - name: Test gcloud access
        if: always()
        continue-on-error: true
        run: |
          {
            echo '## gcloud Test'
            echo 'gcloud version:'
            gcloud --version || true
            echo
            echo 'gcloud auth list:'
            gcloud auth list --filter=status:ACTIVE || true
            echo
            echo 'Trying to get access token...'
            gcloud auth print-access-token --verbosity=debug || true
            echo "exit_code=$?"
          } >> .github/diagnostics/firebase-deploy-status.md 2>&1

      - name: Install Firebase CLI
        if: steps.auth.outcome == 'success'
        continue-on-error: true
        run: npm install -g firebase-tools

      - name: Try Firebase Deploy
        if: steps.auth.outcome == 'success'
        continue-on-error: true
        run: |
          {
            echo '## Firebase Deploy Attempt'
            firebase deploy --only hosting --project ghezelbaash-kg --force || true
            echo "firebase_exit_code=$?"
          } >> .github/diagnostics/firebase-deploy-status.md 2>&1

      - name: Commit diagnostic result
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/diagnostics/firebase-deploy-status.md
          git commit -m 'Record Firebase deploy diagnostic' || exit 0
          git push
