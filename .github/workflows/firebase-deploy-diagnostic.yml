name: Firebase Deploy Diagnostic

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/firebase-deploy-diagnostic.yml'
      - '.github/firebase-deploy-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: firebase-deploy-diagnostic
  cancel-in-progress: true

jobs:
  diagnostic:
    name: Diagnose Firebase Hosting deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare diagnostic file
        run: |
          mkdir -p .github/diagnostics
          {
            echo '# Firebase Deploy Diagnostic'
            echo
            echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo
          } > .github/diagnostics/firebase-deploy-status.md

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        continue-on-error: true
        with:
          project_id: ghezelbaash-kg
          workload_identity_provider: projects/71850730043/locations/global/workloadIdentityPools/github-actions/providers/doctor-ghezelbaash
          service_account: github-firebase-hosting@ghezelbaash-kg.iam.gserviceaccount.com
          create_credentials_file: true
          export_environment_variables: true

      - name: Record auth outcome
        run: |
          {
            echo '## Google Auth'
            echo "auth_outcome=${{ steps.auth.outcome }}"
            echo "auth_conclusion=${{ steps.auth.conclusion }}"
            echo
            echo 'Environment:'
            echo "GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-missing}"
            echo "GOOGLE_GHA_CREDS_PATH=${GOOGLE_GHA_CREDS_PATH:-missing}"
            echo
            echo 'Credential file metadata:'
            if [ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" ] && [ -f "${GOOGLE_APPLICATION_CREDENTIALS}" ]; then
              echo "credential_file_exists=yes"
              python3 - <<'PY'
import json, os
p = os.environ.get('GOOGLE_APPLICATION_CREDENTIALS')
with open(p, 'r', encoding='utf-8') as f:
    data = json.load(f)
for k in ['type','audience','subject_token_type','token_url','service_account_impersonation_url']:
    v = data.get(k, 'missing')
    print(f'{k}={v}')
PY
            else
              echo "credential_file_exists=no"
            fi
            echo
          } >> .github/diagnostics/firebase-deploy-status.md 2>&1

      - name: Install gcloud
        if: always()
        uses: google-github-actions/setup-gcloud@v2
        continue-on-error: true

      - name: Probe Google credentials
        id: gcloud_probe
        if: always()
        continue-on-error: true
        run: |
          set +e
          {
            echo '## Google Credential Probe'
            echo 'gcloud version:'
            gcloud --version
            echo
            echo 'gcloud auth list:'
            gcloud auth list --filter=status:ACTIVE
            echo
            echo 'print access token:'
            gcloud auth print-access-token --verbosity=debug
            echo "print_access_token_exit_code=$?"
            echo
            echo 'project describe:'
            gcloud projects describe ghezelbaash-kg --format='value(projectId,projectNumber,lifecycleState)' --verbosity=debug
            echo "project_describe_exit_code=$?"
          } >> .github/diagnostics/firebase-deploy-status.md 2>&1
          exit 0

      - name: Install Firebase CLI
        id: install_firebase
        if: steps.auth.outcome == 'success'
        continue-on-error: true
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting live channel
        id: firebase_deploy
        if: steps.auth.outcome == 'success' && steps.install_firebase.outcome == 'success'
        continue-on-error: true
        run: |
          set +e
          echo '## Firebase Deploy' >> .github/diagnostics/firebase-deploy-status.md
          firebase deploy --only hosting --project ghezelbaash-kg --force >> .github/diagnostics/firebase-deploy-status.md 2>&1
          code=$?
          echo >> .github/diagnostics/firebase-deploy-status.md
          echo "firebase_deploy_exit_code=${code}" >> .github/diagnostics/firebase-deploy-status.md
          exit 0

      - name: Record final outcome
        if: always()
        run: |
          {
            echo
            echo '## Step Outcomes'
            echo "auth=${{ steps.auth.outcome }}"
            echo "gcloud_probe=${{ steps.gcloud_probe.outcome }}"
            echo "install_firebase=${{ steps.install_firebase.outcome }}"
            echo "firebase_deploy=${{ steps.firebase_deploy.outcome }}"
            echo
            echo "finished_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> .github/diagnostics/firebase-deploy-status.md

      - name: Commit diagnostic result
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/diagnostics/firebase-deploy-status.md
          git commit -m 'Record Firebase deploy diagnostic status' || exit 0
          git push
