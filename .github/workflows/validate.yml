name: Validate production build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --package-lock=false --no-audit --no-fund --registry=https://registry.npmjs.org/
      - name: Build Astro output
        run: npm run build:astro
      - name: Validate distribution
        run: node scripts/with-best-doctor-service-expansion.mjs validate:dist
      - name: Validate URL architecture
        run: node scripts/with-best-doctor-service-expansion.mjs validate:architecture
      - name: Validate answer semantics
        run: node scripts/with-best-doctor-service-expansion.mjs validate:answers
      - name: Validate video pages
        run: node scripts/with-best-doctor-service-expansion.mjs validate:videos
      - name: Validate knowledge page
        run: node scripts/with-best-doctor-service-expansion.mjs validate:knowledge
      - name: Validate Instagram CTA
        run: node scripts/with-best-doctor-service-expansion.mjs validate:instagram
      - name: Validate research and education
        run: node scripts/with-best-doctor-service-expansion.mjs validate:research-education
      - name: Benchmark retrieval
        run: node scripts/with-best-doctor-service-expansion.mjs benchmark:retrieval
