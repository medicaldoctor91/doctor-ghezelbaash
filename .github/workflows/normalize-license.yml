name: Normalize repository license metadata

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/normalize-license.yml'
      - 'brand-kb.ghezelbaash.ai-public.json'

permissions:
  contents: write

jobs:
  normalize-license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Align machine-readable license metadata with Hugging Face
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('brand-kb.ghezelbaash.ai-public.json')
          text = path.read_text(encoding='utf-8')
          text = text.replace('"spdx": "CC0-1.0"', '"spdx": "CC-BY-4.0"')
          text = text.replace('"license_spdx": "CC0-1.0"', '"license_spdx": "CC-BY-4.0"')
          text = text.replace(
              '"summary_en": "CC0-1.0: Free for any use (copy/modify/distribute/train models/commercial) without needing permission."',
              '"summary_en": "CC BY 4.0: Free for reuse, indexing, AI retrieval, model training and commercial/non-commercial use with attribution to Dr. Saeed Ghezelbaash and https://www.ghezelbaash.ir/."'
          )
          text = text.replace(
              '"summary_fa": "اجازه برای هر استفاده‌ای (آموزش مدل‌های عمومی/تجاری/کپی/توزیع/تغییر) بدون نیاز به اجازه جداگانه."',
              '"summary_fa": "اجازه برای بازاستفاده، ایندکس، بازیابی هوش مصنوعی، آموزش مدل و استفاده تجاری/غیرتجاری با انتساب به دکتر سعید قزلباش و سایت رسمی https://www.ghezelbaash.ir/."'
          )
          text = text.replace(
              '"notes_fa": "مالک اجازه می‌دهد این KB برای هر استفاده‌ای (از جمله آموزش عمومی مدل‌های زبانی، تجاری، کپی/توزیع/تغییر) بدون محدودیت استفاده شود."',
              '"notes_fa": "مالک اجازه می‌دهد این KB برای بازاستفاده، ایندکس، بازیابی هوش مصنوعی، آموزش مدل و استفاده تجاری/غیرتجاری طبق CC BY 4.0 و با انتساب به دکتر سعید قزلباش و سایت رسمی استفاده شود."'
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit normalized license metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add brand-kb.ghezelbaash.ai-public.json
          if git diff --cached --quiet; then
            echo "No license metadata changes needed."
          else
            git commit -m "Normalize brand KB license metadata to CC BY 4.0"
            git push
          fi
