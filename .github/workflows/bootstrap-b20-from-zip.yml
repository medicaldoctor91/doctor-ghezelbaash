name: Bootstrap B20 source from ZIP

on:
  workflow_dispatch:

permissions: write-all

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate any ZIP with package.json
        run: |
          set -e
          FOUND_ZIP=""
          FOUND_ROOT=""
          for zipfile in *.zip; do
            if [ ! -f "$zipfile" ]; then
              continue
            fi
            echo "Inspecting $zipfile"
            WORKDIR="/tmp/b20-zip-work"
            mkdir -p "$WORKDIR"
            unzip -q -o "$zipfile" -d "$WORKDIR"
            PKG=$(find "$WORKDIR" -name package.json | head -n 1)
            if [ -n "$PKG" ]; then
              FOUND_ZIP="$zipfile"
              FOUND_ROOT=$(dirname "$PKG")
              break
            fi
          done
          test -n "$FOUND_ZIP" || (echo "No source ZIP with package.json found." && exit 1)
          echo "FOUND_ZIP=$FOUND_ZIP" >> "$GITHUB_ENV"
          echo "FOUND_ROOT=$FOUND_ROOT" >> "$GITHUB_ENV"
          echo "Using ZIP: $FOUND_ZIP"
          echo "Using root: $FOUND_ROOT"

      - name: Copy extracted source into repository
        run: |
          set -e
          cp -a "$FOUND_ROOT/." ./
          test -f package.json || (echo "package.json missing after copy" && exit 1)

      - name: Commit B20 source
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Bootstrap B20 clean Astro source"
            git push
          fi
