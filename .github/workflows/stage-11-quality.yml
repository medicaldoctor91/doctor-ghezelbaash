name: Stage 11 quality gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage-11-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  LIGHTHOUSE_VERSION: '13.4.0'
  AXE_VERSION: '4.12.1'
  PLAYWRIGHT_VERSION: '1.61.0'

jobs:
  browser-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Validate lockfile root contract
        shell: bash
        run: |
          node -e "const p=require('./package.json');const l=require('./package-lock.json');if(p.name!==l.name||p.version!==l.version||l.lockfileVersion!==3)process.exit(1)"

      - name: Install project dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Install pinned Playwright test runner
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: |
          npm install --no-save --package-lock=false --no-audit --no-fund "@playwright/test@${PLAYWRIGHT_VERSION}"
          npx playwright install --with-deps chromium firefox webkit msedge

      - name: Build validated static dist
        run: npm run build

      - name: Record pinned audit tool versions
        shell: bash
        run: |
          mkdir -p quality-reports
          printf '{"lighthouse":"%s","axe":"%s","playwright":"%s"}\n' "$LIGHTHOUSE_VERSION" "$AXE_VERSION" "$PLAYWRIGHT_VERSION" > quality-reports/tool-versions.json

      - name: Serve dist with Brotli and cache semantics
        shell: bash
        run: |
          set -euo pipefail
          node scripts/serve-dist.mjs dist 4173 > quality-reports/server.log 2>&1 &
          echo $! > quality-reports/server.pid
          for attempt in $(seq 1 30); do
            curl --compressed -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat quality-reports/server.log
          exit 1

      - name: Run Lighthouse three times per profile and enforce medians
        shell: bash
        run: |
          set -euo pipefail
          for profile in mobile desktop; do
            for run in 1 2 3; do
              preset=()
              if [ "$profile" = desktop ]; then preset=(--preset=desktop); fi
              npx --yes "lighthouse@${LIGHTHOUSE_VERSION}" http://127.0.0.1:4173/ \
                --quiet \
                --chrome-flags='--headless=new --no-sandbox --disable-dev-shm-usage' \
                --output=json \
                --output-path="quality-reports/lighthouse-${profile}-${run}.json" \
                "${preset[@]}"
            done
          done
          node scripts/summarize-lighthouse.mjs quality-reports --enforce

      - name: Run automated accessibility scan
        shell: bash
        run: |
          set +e
          npx --yes "@axe-core/cli@${AXE_VERSION}" http://127.0.0.1:4173/ --exit --save quality-reports/axe.json > quality-reports/axe.log 2>&1
          status=$?
          cat quality-reports/axe.log
          printf '%s\n' "$status" > quality-reports/axe-exit-code.txt
          exit $status

      - name: Run Chromium Firefox WebKit Edge and mobile Safari behavior tests
        env:
          BASE_URL: http://127.0.0.1:4173
        run: npx playwright test --workers=1 --fail-on-flaky-tests

      - name: Upload full Stage 11 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stage-11-quality-evidence
          path: |
            quality-reports
            playwright-report
            test-results
            dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
