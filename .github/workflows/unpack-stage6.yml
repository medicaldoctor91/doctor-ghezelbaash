name: Unpack Stage 6 Site Package

on:
  workflow_dispatch:
  push:
    paths:
      - "stage6.zip"
      - ".github/workflows/unpack-stage6.yml"

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare clean unpack directory
        run: |
          rm -rf __stage6_unpack
          mkdir __stage6_unpack

      - name: Unpack stage6.zip without workflow files
        run: |
          if [ ! -f "stage6.zip" ]; then
            echo "stage6.zip not found in repository root."
            exit 1
          fi

          unzip -o stage6.zip -d __stage6_unpack

          rm -rf __stage6_unpack/.github
          rm -rf __stage6_unpack/__MACOSX

      - name: Remove old generated site folders
        run: |
          rm -rf \
            dr-saeed-ghezelbash \
            dr-saeed-ghezelbash-aesthetic-clinic \
            about-dr-saeed-ghezelbash \
            clinic \
            services \
            contact \
            evidence \
            kg \
            botox-kermanshah \
            filler-kermanshah \
            thread-lift-kermanshah \
            skin-hair-rejuvenation-kermanshah \
            double-chin-liposuction-kermanshah \
            routes \
            docs

      - name: Copy unpacked files into repository root
        run: |
          cp -a __stage6_unpack/. .
          rm -rf __stage6_unpack
          rm -f stage6.zip

      - name: Commit unpacked Stage 6 files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Apply Stage 6 entity-path static site baseline"
          git push
