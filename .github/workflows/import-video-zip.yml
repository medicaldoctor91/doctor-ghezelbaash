name: Import video ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract all video ZIP bundles
        run: |
          set -e
          rm -rf /tmp/video-import
          mkdir -p /tmp/video-import public/videos
          FOUND=0
          for zipfile in *.zip; do
            if [ ! -f "$zipfile" ]; then
              continue
            fi
            if unzip -l "$zipfile" | grep -Eq '(\.mp4|\.mp4\.part[0-9]+)'; then
              echo "Extracting $zipfile"
              unzip -q -o "$zipfile" -d /tmp/video-import
              FOUND=1
            fi
          done
          test "$FOUND" = "1" || (echo "No ZIP containing MP4 files or MP4 parts found in repository root." && exit 1)
          find /tmp/video-import -type f -name '*.mp4' -exec cp {} public/videos/ \;
          for firstpart in $(find /tmp/video-import -type f -name '*.mp4.part001' | sort); do
            base=${firstpart%.part001}
            name=$(basename "$base")
            echo "Reconstructing $name"
            cat $(find /tmp/video-import -type f -name "$(basename "$base").part*" | sort) > "public/videos/$name"
          done
          rm -f ./*.zip
          test -n "$(find public/videos -maxdepth 1 -type f -name '*.mp4' -print -quit)" || (echo "No MP4 copied to public/videos." && exit 1)

      - name: Commit videos
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add B20 video assets"
            git push
          fi
