name: Verify production deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Validate production verifier syntax
        run: python3 -m py_compile scripts/audit-production.py scripts/run-production-audit.py scripts/verify-stage-11-production.py scripts/verify-schema-production.py

      - name: Audit the live custom domain
        run: python3 scripts/run-production-audit.py --attempts 36 --delay 20

      - name: Verify the Stage 11 Cloudflare contract
        run: python3 scripts/verify-stage-11-production.py --commit "${GITHUB_SHA}" --attempts 18 --delay 20

      - name: Verify inline and external production schema visibility
        run: python3 scripts/verify-schema-production.py --commit "${GITHUB_SHA}" --attempts 18 --delay 20

      - name: Record verified Cloudflare production commit
        shell: bash
        run: git push --force origin "${GITHUB_SHA}:refs/heads/cloudflare-production-live"

      - name: Upload production audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-audit-report
          path: production-audit
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
