name: Verify production deployment

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-production
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Audit the live custom domain
        run: python3 scripts/audit-production.py --attempts 36 --delay 20

      - name: Upload production audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-audit-report
          path: production-audit
          if-no-files-found: warn
          retention-days: 7
