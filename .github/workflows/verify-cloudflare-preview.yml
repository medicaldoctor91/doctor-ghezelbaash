name: Verify Cloudflare Preview

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: cloudflare-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover successful preview for the exact commit
        id: preview
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p preview-evidence
          short_sha="${EXPECTED_SHA:0:7}"
          for attempt in $(seq 1 80); do
            comments="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments")"
            body="$(jq -r --arg sha "$short_sha" '[.[] | select(.user.login == "cloudflare-workers-and-pages[bot]") | select(.body | contains($sha))][-1].body // empty' <<< "$comments")"
            if grep -Fq 'Deploy successful!' <<< "$body"; then
              preview_url="$(grep -oE 'https://[a-z0-9-]+\.doctor-ghezelbaash\.pages\.dev' <<< "$body" | head -1)"
              if [ -n "$preview_url" ]; then
                printf '%s\n' "$body" > preview-evidence/cloudflare-comment.md
                printf '%s\n' "$preview_url" > preview-evidence/preview-url.txt
                printf 'url=%s\n' "$preview_url" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            sleep 15
          done
          printf '%s\n' "No successful Cloudflare preview comment matched ${short_sha}." >&2
          exit 1

      - name: Verify Preview status headers HTML redirects and 404
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          set -euo pipefail
          cache_bust="${EXPECTED_SHA}-$(date +%s)"
          root_url="${PREVIEW_URL}/?verification=${cache_bust}"
          curl --compressed -fsSL -D preview-evidence/home.headers -o preview-evidence/home.html "$root_url"

          grep -Eiq '^x-robots-tag:.*noindex' preview-evidence/home.headers
          grep -Eiq '^strict-transport-security:' preview-evidence/home.headers
          grep -Eiq '^content-security-policy:' preview-evidence/home.headers
          grep -Eiq '^x-content-type-options:[[:space:]]*nosniff' preview-evidence/home.headers
          grep -Fq 'دکتر سعید قزلباش؛ پزشک زیبایی، پوست و مو در کرمانشاه' preview-evidence/home.html
          grep -Fq 'id="mohammad-saeed-ghezelbash"' preview-evidence/home.html
          grep -Fq 'id="dr-saeed-ghezelbash-aesthetic-clinic"' preview-evidence/home.html
          grep -Fq 'id="local-service-intent-answers"' preview-evidence/home.html
          grep -Fq 'id="national-aesthetic-authority-answers"' preview-evidence/home.html
          grep -Fq 'data-deferred-poster' preview-evidence/home.html
          if grep -Eq '<video[^>]+[[:space:]]poster="/videos/thumbnails/' preview-evidence/home.html; then
            printf '%s\n' 'A real video poster remains in the initial Preview HTML.' >&2
            exit 1
          fi

          redirect_status="$(curl -sS -o /dev/null -D preview-evidence/index-redirect.headers -w '%{http_code}' "${PREVIEW_URL}/index.html")"
          test "$redirect_status" = '301'
          grep -Eiq '^location:[[:space:]]*(/|https://[^/]+/)[[:space:]]*$' preview-evidence/index-redirect.headers

          missing_status="$(curl --compressed -sS -D preview-evidence/404.headers -o preview-evidence/404.html -w '%{http_code}' "${PREVIEW_URL}/missing-stage-11-${cache_bust}")"
          test "$missing_status" = '404'
          grep -Fq 'content="noindex,follow"' preview-evidence/404.html
          if grep -Eq '<link[^>]+rel="canonical"' preview-evidence/404.html; then
            printf '%s\n' 'Preview 404 publishes a canonical.' >&2
            exit 1
          fi
          grep -Fq 'این نشانی به جایی نمی‌رسد' preview-evidence/404.html

          curl --compressed -fsSL -D preview-evidence/graph.headers -o preview-evidence/knowledge-graph.jsonld "${PREVIEW_URL}/knowledge-graph.jsonld?verification=${cache_bust}"
          grep -Eiq '^content-type:[[:space:]]*application/ld\+json' preview-evidence/graph.headers
          jq -e '."@graph" | length > 500' preview-evidence/knowledge-graph.jsonld >/dev/null
          jq -e '."@graph"[] | select(."@id" == "https://www.ghezelbaash.ir/#mohammad-saeed-ghezelbash") | ."@type" == "Person"' preview-evidence/knowledge-graph.jsonld >/dev/null
          jq -e '."@graph"[] | select(."@id" == "https://www.ghezelbaash.ir/#dr-saeed-ghezelbash-aesthetic-clinic") | .aggregateRating.ratingValue == 5 and .aggregateRating.ratingCount == 163' preview-evidence/knowledge-graph.jsonld >/dev/null

          curl -fsSI "${PREVIEW_URL}/assets/brand/doctor-hand-syringe-logo-192.png" > preview-evidence/logo.headers
          grep -Eiq '^cache-control:.*max-age=31536000.*immutable' preview-evidence/logo.headers

          printf '{"commit":"%s","preview":"%s","homepage":200,"indexRedirect":301,"missingRoute":404,"previewNoindex":true,"securityHeaders":true,"deferredPosters":true,"graphNodesOver":500}\n' "$EXPECTED_SHA" "$PREVIEW_URL" > preview-evidence/summary.json

      - name: Upload Cloudflare Preview evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-preview-evidence
          path: preview-evidence
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
