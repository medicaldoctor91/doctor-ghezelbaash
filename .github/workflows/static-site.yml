name: Static entity page

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: static-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and validate production output
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build strict production output
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ github.sha }}
          path: |
            build.log
            audit/generated
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
      - name: Upload verified static output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy validated artifact to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

  verify-production:
    name: Verify canonical production domain
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Verify final HTML, release record, and graph
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            html="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://www.ghezelbaash.ir/?deployment=${GITHUB_SHA}-${attempt}" || true)"
            release="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://www.ghezelbaash.ir/release.json?deployment=${GITHUB_SHA}-${attempt}" || true)"
            graph="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://www.ghezelbaash.ir/graph.jsonld?deployment=${GITHUB_SHA}-${attempt}" || true)"
            if grep -Fq 'صورت شما «خدمت» نمی‌خواهد' <<<"$html" \
              && grep -Fq 'rel="canonical" href="https://www.ghezelbaash.ir/"' <<<"$html" \
              && ! grep -Fq 'TODO_VISIBLE_CONTENT' <<<"$html" \
              && grep -Fq '"contentFrozen": true' <<<"$release" \
              && grep -Fq '"releaseStatus": "production-final"' <<<"$release" \
              && grep -Fq '"@id": "https://www.ghezelbaash.ir/#doctor"' <<<"$graph"; then
              printf '%s\n' 'Canonical production domain exposes the validated final entity page.'
              exit 0
            fi
            sleep 20
          done
          printf '%s\n' 'Canonical domain did not expose the validated deployment within the verification window.' >&2
          exit 1
