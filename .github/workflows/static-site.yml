name: Validate static Cloudflare Pages build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and validate production output
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build strict static output
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ github.sha }}
          path: |
            build.log
            audit/generated
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
      - name: Upload verified static output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  verify_cloudflare:
    name: Verify Cloudflare Pages production revision
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Wait for the connected Cloudflare Pages deployment
        shell: bash
        env:
          EXPECTED_REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            release="$(curl -fsSL --retry 1 -H 'Cache-Control: no-cache' "https://www.ghezelbaash.ir/release.json?revision=${EXPECTED_REVISION}-${attempt}" || true)"
            html="$(curl -fsSL --retry 1 -H 'Cache-Control: no-cache' "https://www.ghezelbaash.ir/?revision=${EXPECTED_REVISION}-${attempt}" || true)"
            if grep -Fq "\"sourceRevision\": \"${EXPECTED_REVISION}\"" <<<"$release" \
              && grep -Fq '"deploymentProvider": "cloudflare-pages"' <<<"$release" \
              && grep -Fq 'rel="canonical" href="https://www.ghezelbaash.ir/"' <<<"$html" \
              && ! grep -Fq 'TODO_VISIBLE_CONTENT' <<<"$html"; then
              printf '%s\n' 'Cloudflare Pages serves the validated production revision.'
              exit 0
            fi
            sleep 10
          done
          printf '%s\n' 'Cloudflare Pages did not expose the expected revision within five minutes.' >&2
          exit 1
