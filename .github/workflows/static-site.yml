name: Static entity page

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build and validate production output
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build strict production output
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          cat build.log
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-${{ github.sha }}
          path: |
            build.log
            audit/generated
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
      - name: Enforce successful build
        if: steps.build.outputs.status != '0'
        run: |
          printf '%s\n' 'Strict production build failed. See build diagnostics artifact.' >&2
          exit 1
      - name: Upload verified static output
        if: steps.build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  verify-production:
    name: Verify Cloudflare production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for Git integration deployment and verify canonical output
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            html="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://www.ghezelbaash.ir/?deployment=${GITHUB_SHA}-${attempt}" || true)"
            release="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://www.ghezelbaash.ir/release.json?deployment=${GITHUB_SHA}-${attempt}" || true)"
            graph="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' "https://www.ghezelbaash.ir/graph.jsonld?deployment=${GITHUB_SHA}-${attempt}" || true)"
            if grep -Fq 'صورت شما «خدمت» نمی‌خواهد' <<<"$html" \
              && grep -Fq 'rel="canonical" href="https://www.ghezelbaash.ir/"' <<<"$html" \
              && ! grep -Fq 'TODO_VISIBLE_CONTENT' <<<"$html" \
              && grep -Fq '"contentFrozen": true' <<<"$release" \
              && grep -Fq '"releaseStatus": "production-final"' <<<"$release" \
              && grep -Fq '"@id": "https://www.ghezelbaash.ir/#doctor"' <<<"$graph"; then
              printf '%s\n' 'Cloudflare production exposes the validated final entity page.'
              exit 0
            fi
            sleep 20
          done
          printf '%s\n' 'Cloudflare Git integration did not expose the validated main build in the verification window.' >&2
          exit 1
