name: Unzip Cloudflare Ready Archive

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Repository path of the ZIP file to extract"
        required: true
        default: "ghezelbaash-github-cloudflare-ready.zip"
      target_dir:
        description: "Extraction target. Use . for repository root"
        required: true
        default: "."
      replace_repo_contents:
        description: "Replace repository contents with the extracted Astro project, keeping .git and .github/workflows"
        required: true
        type: boolean
        default: true
      delete_zip:
        description: "Delete the ZIP after successful extraction"
        required: true
        type: boolean
        default: true
  push:
    paths:
      - "ghezelbaash-github-cloudflare-ready.zip"
      - ".github/workflows/unzip-archive.yml"

permissions:
  contents: write

concurrency:
  group: unzip-cloudflare-ready-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unzip:
    name: Extract ZIP and commit project files
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip unzip]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve inputs
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ZIP_PATH="${{ inputs.zip_path }}"
            TARGET_DIR="${{ inputs.target_dir }}"
            REPLACE_REPO_CONTENTS="${{ inputs.replace_repo_contents }}"
            DELETE_ZIP="${{ inputs.delete_zip }}"
          else
            ZIP_PATH="ghezelbaash-github-cloudflare-ready.zip"
            TARGET_DIR="."
            REPLACE_REPO_CONTENTS="true"
            DELETE_ZIP="true"
          fi

          if [ ! -f "$ZIP_PATH" ]; then
            echo "::error::ZIP file not found in repository: $ZIP_PATH"
            echo "Upload the ZIP to the repository root first, then run this workflow again."
            exit 1
          fi

          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"
          echo "TARGET_DIR=$TARGET_DIR" >> "$GITHUB_ENV"
          echo "REPLACE_REPO_CONTENTS=$REPLACE_REPO_CONTENTS" >> "$GITHUB_ENV"
          echo "DELETE_ZIP=$DELETE_ZIP" >> "$GITHUB_ENV"

      - name: Extract ZIP safely
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import pathlib
          import shutil
          import sys
          import tempfile
          import zipfile

          repo = pathlib.Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          zip_path = (repo / os.environ["ZIP_PATH"]).resolve()
          target_dir = (repo / os.environ["TARGET_DIR"]).resolve()
          replace_repo_contents = os.environ.get("REPLACE_REPO_CONTENTS", "true").lower() == "true"
          delete_zip = os.environ.get("DELETE_ZIP", "true").lower() == "true"

          def inside(path: pathlib.Path, base: pathlib.Path) -> bool:
              try:
                  path.resolve().relative_to(base.resolve())
                  return True
              except ValueError:
                  return False

          if not inside(zip_path, repo):
              sys.exit(f"Refusing ZIP outside repository: {zip_path}")
          if not inside(target_dir, repo):
              sys.exit(f"Refusing target outside repository: {target_dir}")
          if not zip_path.is_file():
              sys.exit(f"ZIP file not found: {zip_path}")

          with tempfile.TemporaryDirectory() as tmp:
              tmp_dir = pathlib.Path(tmp).resolve()
              extract_dir = tmp_dir / "extract"
              extract_dir.mkdir()

              with zipfile.ZipFile(zip_path) as archive:
                  for item in archive.infolist():
                      pure = pathlib.PurePosixPath(item.filename)
                      if pure.is_absolute() or ".." in pure.parts:
                          sys.exit(f"Unsafe ZIP path blocked: {item.filename}")
                      destination = (extract_dir / pathlib.Path(*pure.parts)).resolve()
                      if not inside(destination, extract_dir):
                          sys.exit(f"Unsafe ZIP path blocked: {item.filename}")
                  archive.extractall(extract_dir)

              candidates = [p for p in extract_dir.iterdir() if p.name not in {"__MACOSX", ".DS_Store"}]
              source_dir = extract_dir
              if len(candidates) == 1 and candidates[0].is_dir():
                  source_dir = candidates[0]

              if not (source_dir / "package.json").is_file():
                  nested = list(source_dir.glob("*/package.json"))
                  if len(nested) == 1:
                      source_dir = nested[0].parent

              if not (source_dir / "package.json").is_file():
                  sys.exit("Could not find package.json in extracted archive; refusing to import non-project ZIP.")

              if replace_repo_contents and target_dir == repo:
                  keep = {".git", ".github"}
                  for child in repo.iterdir():
                      if child.name in keep or child.resolve() == zip_path:
                          continue
                      if child.is_dir():
                          shutil.rmtree(child)
                      else:
                          child.unlink()

              target_dir.mkdir(parents=True, exist_ok=True)

              for child in source_dir.iterdir():
                  if child.name == ".git":
                      continue
                  destination = target_dir / child.name
                  if child.is_dir():
                      shutil.copytree(child, destination, dirs_exist_ok=True)
                  else:
                      destination.parent.mkdir(parents=True, exist_ok=True)
                      shutil.copy2(child, destination)

          if delete_zip:
              zip_path.unlink(missing_ok=True)

          print(f"Imported {zip_path.name} into {target_dir.relative_to(repo) if target_dir != repo else '.'}")
          PY

      - name: Commit extracted project
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Import Cloudflare-ready Astro project [skip unzip]"
          git push
