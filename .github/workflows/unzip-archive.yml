name: Unzip Root ZIPs Into Main

on:
  workflow_dispatch:
  push:
    paths:
      - "*.zip"
      - ".github/workflows/unzip-archive.yml"

permissions:
  contents: write

concurrency:
  group: unzip-root-zips-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unzip:
    name: Extract root ZIP files into main root
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip unzip]') }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract every ZIP from repository root into repository root
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          zip_files=( *.zip )

          if [ ${#zip_files[@]} -eq 0 ]; then
            echo "::error::No ZIP file exists in the root of main. Put the ZIP beside package.json/.github, not inside a folder."
            exit 1
          fi

          for zip_file in "${zip_files[@]}"; do
            echo "Extracting $zip_file into repository root"
            tmp_dir="$(mktemp -d)"
            unzip -q -o "$zip_file" -d "$tmp_dir"

            source_dir="$tmp_dir"
            first_level_count="$(find "$tmp_dir" -mindepth 1 -maxdepth 1 ! -name '__MACOSX' ! -name '.DS_Store' | wc -l | tr -d ' ')"
            first_level_dir="$(find "$tmp_dir" -mindepth 1 -maxdepth 1 -type d ! -name '__MACOSX' | head -n 1 || true)"

            if [ "$first_level_count" = "1" ] && [ -n "$first_level_dir" ]; then
              source_dir="$first_level_dir"
            fi

            if [ ! -f "$source_dir/package.json" ]; then
              nested_package="$(find "$source_dir" -mindepth 2 -maxdepth 2 -name package.json | head -n 1 || true)"
              if [ -n "$nested_package" ]; then
                source_dir="$(dirname "$nested_package")"
              fi
            fi

            rsync -a "$source_dir"/ ./
            rm -rf "$tmp_dir"
          done

          if [ ! -f package.json ]; then
            echo "::error::ZIP extraction finished, but package.json is still not in repository root. The ZIP structure is not Cloudflare/Astro-ready."
            exit 1
          fi

      - name: Commit extracted files to main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Unzip root ZIP into main [skip unzip]"
          git push origin main
