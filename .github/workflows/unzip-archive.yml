name: Extract repository ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract archive into repository root
        shell: bash
        run: |
          set -euo pipefail
          archive='astro_best_doctor_with_baselayout_domain_v2.zip'
          test -f "$archive"
          unzip -o "$archive" -d .
          rm -f "$archive"

      - name: Commit extracted files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'Extract astro_best_doctor_with_baselayout_domain_v2.zip'
          git push origin HEAD:main
