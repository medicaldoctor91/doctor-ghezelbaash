name: Validate site

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, fix-rich-results-copy-and-best-queries]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Build and validate release
        run: npm run build
