name: Validate site

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Validate production audit syntax
        run: python3 -m py_compile scripts/audit-production.py scripts/run-production-audit.py scripts/verify-stage-11-production.py

      - name: Build and validate release
        id: build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          cat build.log
          exit $status

      - name: Upload build and Stage 11 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-build-report
          path: |
            build.log
            build-reports/stage-9-validation.json
            dist/index.html
            dist/404.html
            dist/knowledge-graph.jsonld
            dist/_headers
            dist/_redirects
            dist/llms.txt
            dist/.well-known/ai.txt
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
