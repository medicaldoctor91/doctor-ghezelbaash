name: Cleanup legacy GitHub Pages domain

on:
  push:
    paths:
      - '.github/workflows/cleanup-legacy-github-pages-domain.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cleanup-legacy-github-pages-domain
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove legacy GitHub Pages domain links
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          old = "https://github." + "ghezelbaash.ir"
          old_host = "github." + "ghezelbaash.ir"
          raw_base = "https://raw.githubusercontent.com/medicaldoctor91/doctor-ghezelbaash/main"
          repo_url = "https://github.com/medicaldoctor91/doctor-ghezelbaash"
          workflow_path = Path('.github/workflows/cleanup-legacy-github-pages-domain.yml')

          text_suffixes = {
              '.html', '.htm', '.json', '.jsonld', '.txt', '.xml', '.md', '.cff', '.yml', '.yaml', '.toml', '.csv'
          }

          def replacement(match: re.Match) -> str:
              path = match.group(1) or ''
              if path in ('', '/'):
                  return repo_url
              clean = path.lstrip('/')
              return f"{raw_base}/{clean}"

          changed = []
          for path in Path('.').rglob('*'):
              if not path.is_file():
                  continue
              if '.git' in path.parts:
                  continue
              if path == workflow_path:
                  continue
              if path.suffix.lower() not in text_suffixes and path.name not in {'robots.txt', 'llms.txt', 'sitemap.xml'}:
                  continue
              try:
                  original = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue

              updated = re.sub(re.escape(old) + r'([^\s"\'<>),}]*)', replacement, original)
              updated = updated.replace(old_host, 'github.com/medicaldoctor91/doctor-ghezelbaash')

              if updated != original:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))

          if workflow_path.exists():
              workflow_path.unlink()
              changed.append(str(workflow_path))

          if changed:
              print('Changed files:')
              for item in changed:
                  print(item)
          else:
              print('No legacy domain links found.')
          PY

      - name: Commit cleanup
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No cleanup changes to commit.'
          else
            git commit -m 'Remove legacy github.ghezelbaash.ir links'
            git push
          fi
