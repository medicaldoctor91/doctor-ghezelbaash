name: Extract ZIP in repository

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path to the ZIP file in the repository (e.g. archive.zip or uploads/site.zip)"
        required: true
        type: string
      destination:
        description: "Extraction destination relative to repository root"
        required: true
        default: "."
        type: string
      delete_zip:
        description: "Delete the ZIP after successful extraction"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: unzip-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extract:
    name: Extract and commit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and extract ZIP safely
        shell: bash
        env:
          ZIP_INPUT: ${{ inputs.zip_path }}
          DEST_INPUT: ${{ inputs.destination }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import os
          import shutil
          import stat
          from pathlib import Path, PurePosixPath
          from zipfile import BadZipFile, ZipFile

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          zip_input = os.environ["ZIP_INPUT"]
          dest_input = os.environ["DEST_INPUT"]

          zip_path = (workspace / zip_input).resolve()
          destination = (workspace / dest_input).resolve()

          def inside_repo(path: Path) -> bool:
              return path == workspace or workspace in path.parents

          if not inside_repo(zip_path):
              raise SystemExit(f"ZIP path escapes repository: {zip_input}")

          if not inside_repo(destination):
              raise SystemExit(f"Destination escapes repository: {dest_input}")

          if not zip_path.is_file():
              raise SystemExit(f"ZIP file not found: {zip_input}")

          if zip_path.suffix.lower() != ".zip":
              raise SystemExit(f"Input is not a .zip file: {zip_input}")

          destination.mkdir(parents=True, exist_ok=True)

          try:
              with ZipFile(zip_path) as archive:
                  planned = []

                  for info in archive.infolist():
                      # Treat backslashes as separators too, so Windows-style traversal
                      # cannot bypass validation even though the runner is Linux.
                      normalized_name = info.filename.replace("\\", "/")
                      member = PurePosixPath(normalized_name)

                      if member.is_absolute() or ".." in member.parts:
                          raise SystemExit(
                              f"Unsafe path inside ZIP: {info.filename}"
                          )

                      mode = info.external_attr >> 16
                      if stat.S_ISLNK(mode):
                          raise SystemExit(
                              f"Symlink entry is not allowed: {info.filename}"
                          )

                      relative = Path(*member.parts)
                      target = (destination / relative).resolve()

                      if target != destination and destination not in target.parents:
                          raise SystemExit(
                              f"Archive entry escapes destination: {info.filename}"
                          )

                      if target == zip_path:
                          raise SystemExit(
                              f"Archive would overwrite itself: {info.filename}"
                          )

                      planned.append((info, target, mode))

                  for info, target, mode in planned:
                      if info.is_dir():
                          target.mkdir(parents=True, exist_ok=True)
                          continue

                      target.parent.mkdir(parents=True, exist_ok=True)
                      with archive.open(info, "r") as src, target.open("wb") as dst:
                          shutil.copyfileobj(src, dst)

                      permissions = mode & 0o777
                      if permissions:
                          target.chmod(permissions)

          except BadZipFile as exc:
              raise SystemExit(f"Invalid or corrupted ZIP: {zip_input}") from exc

          print(f"Extracted {zip_input} -> {dest_input}")
          PY

      - name: Delete ZIP if requested
        if: ${{ inputs.delete_zip }}
        shell: bash
        env:
          ZIP_INPUT: ${{ inputs.zip_path }}
        run: |
          set -euo pipefail
          rm -f -- "$GITHUB_WORKSPACE/$ZIP_INPUT"

      - name: Commit and push extracted files
        shell: bash
        env:
          ZIP_INPUT: ${{ inputs.zip_path }}
          DEST_INPUT: ${{ inputs.destination }}
        run: |
          set -euo pipefail

          git add -A

          if git diff --cached --quiet; then
            echo "No repository changes produced by extraction."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: extract ${ZIP_INPUT} to ${DEST_INPUT}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
