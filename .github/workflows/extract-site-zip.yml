name: Extract uploaded site ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '*.zip'

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Extract first ZIP from repository root
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE=$(find . -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repository root."
            exit 0
          fi

          echo "Found ZIP file: $ZIP_FILE"
          rm -rf .extract-tmp
          mkdir .extract-tmp
          unzip -q -o "$ZIP_FILE" -d .extract-tmp

          # If ZIP contains a single top-level folder, copy its contents to repo root.
          TOP_LEVEL_COUNT=$(find .extract-tmp -mindepth 1 -maxdepth 1 ! -name '__MACOSX' | wc -l | tr -d ' ')
          TOP_LEVEL_DIR=$(find .extract-tmp -mindepth 1 -maxdepth 1 -type d ! -name '__MACOSX' | head -n 1 || true)

          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name '.extract-tmp' \
            -exec rm -rf {} +

          if [ "$TOP_LEVEL_COUNT" = "1" ] && [ -n "$TOP_LEVEL_DIR" ]; then
            cp -a "$TOP_LEVEL_DIR"/. .
          else
            cp -a .extract-tmp/. .
            rm -rf __MACOSX
          fi

          rm -rf .extract-tmp "$ZIP_FILE"

      - name: Commit extracted site
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Extract uploaded site ZIP"
          git push
