name: Graph Quality

on:
  push:
    branches: [main]
    paths:
      - "knowledge-graph/**"
      - ".github/workflows/graph-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Graph Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install graph tools
        run: |
          pip install rdflib pyshacl networkx

      - name: Check graph files
        run: |
          test -f knowledge-graph/source/baseline-manifest.yml
          test -f knowledge-graph/entity-registry.yml
          test -f knowledge-graph/wikidata-mapping.yml
          test -f knowledge-graph/claims-registry.yml

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: graph-quality-reports
          path: knowledge-graph/
