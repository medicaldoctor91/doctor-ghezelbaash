name: Graph Quality

on:
  push:
    branches: [main]
    paths:
      - "graph-ghezelbaash-final.jsonld"
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/graph-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Standard Graph Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install site dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install standard graph tools
        run: |
          python -m pip install --upgrade pip
          pip install rdflib networkx

      - name: Validate generated JSON-LD with RDF parser
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from rdflib import Graph
          src = Path('dist/graph-ghezelbaash-final.jsonld')
          if not src.exists():
              src = Path('graph-ghezelbaash-final.jsonld')
          data = json.loads(src.read_text(encoding='utf-8'))
          Graph().parse(str(src), format='json-ld')
          out = Path('graph-quality-reports')
          out.mkdir(exist_ok=True)
          (out / 'standard-validation.json').write_text(json.dumps({'nodes': len(data.get('@graph', []))}, indent=2), encoding='utf-8')
          PY

      - name: Generate standard graph metrics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import networkx as nx
          src = Path('dist/graph-ghezelbaash-final.jsonld')
          if not src.exists():
              src = Path('graph-ghezelbaash-final.jsonld')
          data = json.loads(src.read_text(encoding='utf-8'))
          G = nx.DiGraph()
          def vals(x): return x if isinstance(x, list) else ([] if x is None else [x])
          def rid(x): return x.get('@id') if isinstance(x, dict) else (x if isinstance(x, str) and x.startswith('http') else None)
          for n in data.get('@graph', []):
              sid = n.get('@id')
              if not sid: continue
              G.add_node(sid)
              for k, v in n.items():
                  if k.startswith('@'): continue
                  for item in vals(v):
                      tid = rid(item)
                      if tid: G.add_edge(sid, tid)
          deg = nx.degree_centrality(G) if G.number_of_nodes() else {}
          pr = nx.pagerank(G) if G.number_of_edges() else {}
          out = Path('graph-quality-reports')
          out.mkdir(exist_ok=True)
          report = {
              'nodes': G.number_of_nodes(),
              'edges': G.number_of_edges(),
              'top_degree': sorted(deg.items(), key=lambda x: x[1], reverse=True)[:20],
              'top_pagerank': sorted(pr.items(), key=lambda x: x[1], reverse=True)[:20],
              'no_incoming': [n for n in G.nodes if G.in_degree(n) == 0],
              'no_outgoing': [n for n in G.nodes if G.out_degree(n) == 0]
          }
          (out / 'graph-health.json').write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: graph-quality-reports
          path: graph-quality-reports/
