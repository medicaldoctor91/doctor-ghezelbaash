name: Graph Quality

on:
  push:
    branches: [main]
    paths:
      - "graph-ghezelbaash-final.jsonld"
      - "knowledge-graph/**"
      - ".github/workflows/graph-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Graph Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install graph tools
        run: |
          python -m pip install --upgrade pip
          pip install rdflib pyshacl networkx

      - name: Materialize root graph snapshot
        run: |
          set -euo pipefail
          test -f graph-ghezelbaash-final.jsonld
          mkdir -p knowledge-graph/runtime knowledge-graph/reports
          cp graph-ghezelbaash-final.jsonld knowledge-graph/runtime/graph.current.jsonld

      - name: Validate graph rules
        run: |
          set -euo pipefail
          for shape in knowledge-graph/rules/*.ttl knowledge-graph/shapes/*.ttl; do
            test -f "$shape" || continue
            echo "Running SHACL: $shape"
            pyshacl -s "$shape" -df json-ld knowledge-graph/runtime/graph.current.jsonld
          done

      - name: Run SPARQL audits
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from rdflib import Graph
          graph = Graph().parse('knowledge-graph/runtime/graph.current.jsonld', format='json-ld')
          out = Path('knowledge-graph/reports')
          out.mkdir(parents=True, exist_ok=True)
          results = {}
          for q in sorted(Path('knowledge-graph/sparql').glob('*.rq')):
              rows = []
              for row in graph.query(q.read_text(encoding='utf-8')):
                  rows.append([str(x) for x in row])
              results[q.name] = rows
          (out/'sparql-audit.json').write_text(json.dumps(results, ensure_ascii=False, indent=2), encoding='utf-8')
          PY

      - name: Generate graph metrics
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import networkx as nx
          data=json.loads(Path('knowledge-graph/runtime/graph.current.jsonld').read_text(encoding='utf-8'))
          G=nx.DiGraph()
          def vals(x): return x if isinstance(x,list) else ([] if x is None else [x])
          def rid(x): return x.get('@id') if isinstance(x,dict) else (x if isinstance(x,str) and x.startswith('http') else None)
          for n in data.get('@graph',[]):
              sid=n.get('@id')
              if not sid: continue
              G.add_node(sid)
              for k,v in n.items():
                  if k.startswith('@'): continue
                  for item in vals(v):
                      tid=rid(item)
                      if tid: G.add_edge(sid,tid)
          deg=nx.degree_centrality(G) if G.number_of_nodes() else {}
          pr=nx.pagerank(G) if G.number_of_edges() else {}
          out=Path('knowledge-graph/reports')
          out.mkdir(parents=True,exist_ok=True)
          report={'nodes':G.number_of_nodes(),'edges':G.number_of_edges(),'top_degree':sorted(deg.items(),key=lambda x:x[1],reverse=True)[:20],'top_pagerank':sorted(pr.items(),key=lambda x:x[1],reverse=True)[:20],'no_incoming':[n for n in G.nodes if G.in_degree(n)==0],'no_outgoing':[n for n in G.nodes if G.out_degree(n)==0]}
          (out/'graph-health.json').write_text(json.dumps(report,ensure_ascii=False,indent=2),encoding='utf-8')
          PY

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: graph-quality-reports
          path: |
            knowledge-graph/runtime/graph.current.jsonld
            knowledge-graph/reports/
