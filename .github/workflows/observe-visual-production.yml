name: Observe Visual Production

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  production-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Wait for and verify live visual release
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request
          from pathlib import Path

          base = 'https://www.ghezelbaash.ir/'
          required = [
              '<h1 id="hero-title">دکتر سعید قزلباش</h1>',
              '<h2 id="services-title">خدمات کلینیک</h2>',
              'راهنمای انتخاب موضوع',
              'بوتاکس؛ کاربردها، محدودیت‌ها و مراقبت‌ها',
              'سوابق و پروفایل‌های رسمی',
          ]
          forbidden = [
              'صورت شما «خدمت» نمی‌خواهد',
              'موتور تصمیم بالینی',
              '>هویت پزشک<',
              'مرکز دانش ویدئویی',
          ]
          report = {}
          for attempt in range(1, 31):
              url = f'{base}?visual-production={int(time.time())}-{attempt}'
              request = urllib.request.Request(url, headers={
                  'User-Agent': 'GhezelbaashVisualProductionAudit/1.0',
                  'Cache-Control': 'no-cache',
                  'Pragma': 'no-cache',
                  'Accept-Encoding': 'identity',
              })
              try:
                  with urllib.request.urlopen(request, timeout=45) as response:
                      html = response.read().decode('utf-8', errors='replace')
                      report = {
                          'attempt': attempt,
                          'statusCode': response.status,
                          'bytes': len(html.encode('utf-8')),
                          'required': {item: item in html for item in required},
                          'forbidden': {item: item in html for item in forbidden},
                          'videoChapterGroups': html.count('class="video-chapters"'),
                          'profileDisclosures': html.count('class="article-profile-links"'),
                          'contextualVideos': html.count('data-inline-video'),
                          'contextualImages': html.count('data-contextual-image'),
                      }
                      passed = (
                          response.status == 200
                          and all(report['required'].values())
                          and not any(report['forbidden'].values())
                          and report['videoChapterGroups'] == 6
                          and report['profileDisclosures'] == 1
                          and report['contextualVideos'] == 12
                          and report['contextualImages'] >= 6
                      )
                      report['status'] = 'pass' if passed else 'waiting'
                      print(json.dumps(report, ensure_ascii=False, indent=2))
                      if passed:
                          break
              except Exception as exc:
                  report = {'attempt': attempt, 'status': 'error', 'error': repr(exc)}
                  print(json.dumps(report, ensure_ascii=False, indent=2))
              if attempt < 30:
                  time.sleep(20)
          Path('visual-production-audit.json').write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          if report.get('status') != 'pass':
              raise SystemExit('live visual release was not observed within the retry window')
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-production-audit
          path: visual-production-audit.json
          retention-days: 3
