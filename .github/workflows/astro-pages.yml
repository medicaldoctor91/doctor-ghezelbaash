name: Deploy Astro Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show build environment
        run: |
          set -euo pipefail
          node --version
          npm --version
          test -f package-lock.json && echo "package-lock.json found; using npm ci" || echo "package-lock.json not found; using npm install fallback"

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Validate source, schema, and authority layers
        run: |
          set -euo pipefail
          npm run validate:source
          npm run validate:schema
          npm run validate:authority

      - name: Validate primary graph layers
        run: |
          set -euo pipefail
          npm run validate:primary-graph

      - name: Build Astro site
        run: |
          set -euo pipefail
          npm run build

      - name: Validate dist artifacts
        run: |
          set -euo pipefail
          npm run validate:dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
