name: Deploy Astro Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: astro-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository without external actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD

      - name: Show build environment
        run: |
          set -euo pipefail
          node --version
          npm --version
          test -f package-lock.json && echo "package-lock.json found; using npm ci" || echo "package-lock.json not found; using npm install fallback"

      - name: Install dependencies
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Validate source, schema, and authority layers
        run: |
          set -euo pipefail
          npm run validate:source
          npm run validate:schema
          npm run validate:authority

      - name: Validate primary graph layers
        run: |
          set -euo pipefail
          npm run validate:primary-graph

      - name: Build Astro site
        run: |
          set -euo pipefail
          npm run build

      - name: Validate dist artifacts
        run: |
          set -euo pipefail
          npm run validate:dist

      - name: Publish dist to gh-pages branch
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -d dist
          publish_dir="$(mktemp -d)"
          cp -a dist/. "${publish_dir}/"
          cd "${publish_dir}"
          git init .
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy Astro site"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
