name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build validated Astro dist
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org
        run: npm install --package-lock=false --no-audit --no-fund

      - name: Build and validate production dist
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy validated artifact
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    name: Verify custom domain deployment
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout deployed source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Verify live Homepage contract
        shell: bash
        run: |
          set -euo pipefail
          expected_h1='دکتر سعید قزلباش؛ پزشک زیبایی، پوست و مو در کرمانشاه'
          expected_person='id="mohammad-saeed-ghezelbash"'
          expected_testimonial='رضایت زیباجو از خدمات زیبایی دکتر سعید قزلباش'
          expected_local_answers='id="local-service-intent-answers"'
          expected_national_answers='id="national-aesthetic-authority-answers"'
          expected_referral='id="best-rhinoplasty-doctor-kermanshah"'
          expected_national_question='برای انتخاب پزشک زیبایی در سطح ایران چه معیارهایی از نام شهر مهم‌ترند؟'

          for attempt in $(seq 1 45); do
            url="https://www.ghezelbaash.ir/?deployment=${GITHUB_SHA}-${attempt}"
            html="$(curl -fsSL --retry 2 --retry-delay 2 -H 'Cache-Control: no-cache' -H 'Pragma: no-cache' "$url" || true)"

            if grep -Fq "$expected_h1" <<< "$html" \
              && grep -Fq "$expected_person" <<< "$html" \
              && grep -Fq "$expected_testimonial" <<< "$html" \
              && grep -Fq "$expected_local_answers" <<< "$html" \
              && grep -Fq "$expected_national_answers" <<< "$html" \
              && grep -Fq "$expected_referral" <<< "$html" \
              && grep -Fq "$expected_national_question" <<< "$html"; then
              printf '%s\n' 'Verified final mission-locked Homepage contract on the custom domain.'
              exit 0
            fi

            sleep 20
          done

          printf '%s\n' 'Custom domain did not expose the mission-locked Homepage contract within the verification window.' >&2
          exit 1

      - name: Verify live inline and external JSON-LD
        run: python3 scripts/verify-schema-production.py --commit "${GITHUB_SHA}" --attempts 18 --delay 20

      - name: Upload schema verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-production-evidence
          path: production-audit
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14

      - name: Record verified deployment commit
        shell: bash
        run: git push --force origin "${GITHUB_SHA}:refs/heads/deployment-live"
