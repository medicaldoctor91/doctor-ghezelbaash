name: Deploy Firebase Hosting (live)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy kg.ghezelbaash.ir to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/71850730043/locations/global/workloadIdentityPools/github-actions/providers/doctor-ghezelbaash
          service_account: github-firebase-hosting@ghezelbaash-kg.iam.gserviceaccount.com

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting live channel
        run: firebase deploy --only hosting --project ghezelbaash-kg --force
