name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via WIF
        uses: google-github-actions/auth@v3
        with:
          project_id: ghezelbaash-kg
          workload_identity_provider: projects/71850730043/locations/global/workloadIdentityPools/github-actions/providers/doctor-ghezelbaash
          service_account: github-firebase-hosting@ghezelbaash-kg.iam.gserviceaccount.com
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project ghezelbaash-kg --force
