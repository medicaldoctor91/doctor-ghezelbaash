version: 1
status: active
phase: 4
purpose: graph_spine

core_nodes:
  doctor: "https://www.ghezelbaash.ir/#dr-saeed-ghezelbash"
  physician: "https://www.ghezelbaash.ir/#physician"
  clinic: "https://www.ghezelbaash.ir/#clinic"
  dataset: "https://www.ghezelbaash.ir/kg/#dataset"
  website: "https://www.ghezelbaash.ir/#website"
  scope_set: "https://www.ghezelbaash.ir/kg/aesthetic-scope#term-set"

spine_layers:
  identity:
    nodes: [doctor, physician, clinic, dataset, website]
  services:
    relation_from_clinic: [makesOffer, availableService]
    relation_from_physician: [makesOffer, availableService, knowsAbout]
  pages:
    required_links: [mainEntity, about, subjectOf]
  knowledge:
    required_links: [knowsAbout, hasDefinedTerm, inDefinedTermSet, category]
  evidence:
    required_links: [subjectOf, citation, identifier]

rules:
  - doctor_and_clinic_must_remain_distinct
  - services_must_be_connected_to_clinic_or_physician
  - service_pages_must_point_to_service
  - knowledge_terms_must_not_be_promoted_to_offers_without_approval
  - dataset_must_describe_graph_not_replace_doctor_or_clinic
  - graph_growth_must_strengthen_spine_not_create_islands
