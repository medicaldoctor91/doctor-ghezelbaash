version: 1
status: active
purpose: graph scope separation

rules:
  - public_pages_do_not_limit_graph_topics
  - knowledge_topic_is_not_automatically_an_offer
  - offered_items_must_be_actual_current_services
  - knowledge_topics_use_definedterm_and_knowsabout
  - new_claims_require_support
  - no_edge_spam

layers:
  knowledge_scope:
    types: [DefinedTerm, DefinedTermSet, Thing]
    relations: [knowsAbout, about, mentions, subjectOf, isPartOf, hasPart, category]
  official_service_scope:
    types: [Service, Offer, OfferCatalog]
    rule: only_for_approved_current_services
  evidence_scope:
    types: [CreativeWork, WebPage, Dataset, Claim, PropertyValue]
    rule: support_identity_scope_service_credential_claim_or_provenance

forbidden:
  - promote_knowledge_topic_to_offer_without_approval
  - uncertain_sameAs
  - unsupported_claim
  - merge_person_and_clinic
  - metric_inflation_edges

next_expansion_target:
  layer: physician_knowledge_scope
  status: ready_after_identity_lock
